<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin - Olomi</title>
  
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/admin.css" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Rubik:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  <script type="module" src="./js/main.js?v=2.0" defer></script>
  <script type="module" src="./js/admin.js" defer></script>
</head>
<body>
  <main class="site-main">
    <div class="container">
      <section class="admin-section">
        <h2 class="admin-section-title">Adicionar / Editar Produto</h2>
        <form id="product-form" class="admin-form">
          <input name="name" type="text" placeholder="Nome do Produto" required />
          <textarea name="description" placeholder="Descrição do Produto" rows="4"></textarea>
          <div class="form-grid">
            <input name="price" type="text" placeholder="Preço (ex: 29,90)" required />
            <input name="promoPrice" type="number" step="0.01" placeholder="Preço Promocional (Opcional)" />
            <input name="stock" type="number" placeholder="Estoque" required />
          </div>
          <input name="category" type="text" placeholder="Categoria" required />
          <fieldset style="border: 1px solid #ddd; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
            <legend style="font-weight: bold; padding: 0 0.5rem; color: var(--cor-laranja);">Dados para Frete (Oculto)</legend>
            <div class="form-grid">
              <input name="weight" type="number" step="0.01" placeholder="Peso (kg) ex: 0.5" required />
              <input name="length" type="number" placeholder="Comprimento (cm)" required />
              <input name="width" type="number" placeholder="Largura (cm)" required />
              <input name="height" type="number" placeholder="Altura (cm)" required />
            </div>
          </fieldset>
          <label class="file-upload-label">
            <span>Escolher imagens do produto</span>
            <input id="image-upload" name="images" type="file" accept="image/*" multiple />
          </label>
          
          <div id="image-preview-container" class="image-preview-container"></div>
          
          <button type="submit" class="submit-btn">Salvar Produto</button>
        </form>
      </section>
      <section class="admin-section">
        <h2 class="admin-section-title">Aparência da Loja (Tema)</h2>
        
        <style>
          .logo-edit-container:hover .logo-overlay { opacity: 1 !important; }
        </style>

        <div style="display: flex; gap: 3rem; align-items: center; flex-wrap: wrap;">
          
          <div style="display: flex; flex-direction: column; align-items: center;">
            <label style="font-weight: bold; margin-bottom: 15px;">Logotipo da Loja</label>
            
            <div class="logo-edit-container" id="logo-edit-container" style="position: relative; width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--cor-laranja); overflow: hidden; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
              <img id="current-logo-img" src="./assets/img/logo.jpg" alt="Logo Atual" style="width: 100%; height: 100%; object-fit: cover;" />
              
              <div class="logo-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
              </div>
            </div>
            
            <input type="file" id="logoUpload" accept="image/png, image/jpeg, image/webp" style="display: none;" />
            <span style="font-size: 0.85rem; color: #666; margin-top: 10px;">Clique na imagem para alterar</span>
          </div>

          <form id="theme-form" class="admin-form" style="flex: 1; min-width: 300px;">
            <div class="form-grid">
              <div>
                <label for="themeColor" style="display:block; margin-bottom: 5px; font-weight: bold;">Cor Principal dos Botões</label>
                <input type="color" id="themeColor" name="themeColor" value="#f39c12" style="height: 50px; cursor: pointer; padding: 0;" />
              </div>
              <div>
                <label for="topBarText" style="display:block; margin-bottom: 5px; font-weight: bold;">Mensagem da Faixa no Topo</label>
                <input type="text" id="topBarText" name="topBarText" placeholder="Ex: Frete Grátis acima de R$ 200!" />
              </div>
            </div>
            <button type="submit" class="submit-btn" style="margin-top: 1rem;">Salvar Cores e Texto</button>
          </form>

        </div>
      </section>
      <section class="admin-section">
        <h2 class="admin-section-title">Produtos Cadastrados</h2>
        <div class="table-container">
          <table id="products-table" class="admin-table">
            <thead>
              <tr>
                <th>Imagem</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
      <section class="admin-section">
        <h2 class="admin-section-title">Pedidos Recebidos</h2>
        <div class="table-container">
          <table id="orders-table" class="admin-table">
            <thead>
              <tr>
                <th>ID do Pedido</th>
                <th>Cliente</th>
                <th>Data</th>
                <th>Total</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
